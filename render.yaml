services:
  - type: web
    name: biasscope
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GCP_PROJECT_ID
        sync: false
      - key: GCP_LOCATION
        value: us-central1
      - key: GCP_CLIENT_EMAIL
        sync: false
      - key: GCP_PRIVATE_KEY
        sync: false
      - key: APP_URL
        sync: false
